<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strumly — Ukulele Chord Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080b10;
  --surface: #0e1318;
  --surface2: #141b22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f4f8;
  --muted: #4a5568;
  --muted2: #718096;
  --accent: #00e5ff;
  --accent2: #7b61ff;
  --accent3: #ff6b6b;
  --green: #00d68f;
  --amber: #ffb300;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Instrument Serif', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(123,97,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 60% 30%, rgba(0,214,143,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; }

/* HEADER */
header {
  padding: 40px 40px 0;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 12px; }

.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 0 20px rgba(0,229,255,0.25);
}

.logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em; }
.logo-text span { color: var(--accent); }

.header-badge {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  color: var(--muted2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  text-transform: uppercase;
}

/* HERO */
.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 72px 40px 52px;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--accent); }

.hero-title {
  font-size: clamp(2.6rem, 5.5vw, 4.6rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.94;
  margin-bottom: 20px;
}

.hero-title .em {
  font-family: var(--font-body);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  font-size: 1.08em;
}

.hero-sub {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--muted2);
  max-width: 400px;
  line-height: 1.65;
}

/* SEARCH */
.search-panel {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px 72px;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-bottom: 12px;
}

.song-input {
  width: 100%;
  height: 62px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 0 22px;
  font-size: 0.98rem;
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: all 0.3s;
  letter-spacing: -0.01em;
}
.song-input::placeholder { color: var(--muted); font-weight: 400; }
.song-input:focus {
  border-color: var(--accent);
  background: var(--surface2);
  box-shadow: 0 0 0 1px var(--accent), 0 0 28px rgba(0,229,255,0.07);
}

.gen-btn {
  height: 62px;
  padding: 0 30px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 14px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.88rem;
  letter-spacing: 0.02em;
  color: #000;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.gen-btn::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.15); opacity:0; transition:opacity 0.2s; }
.gen-btn:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(0,229,255,0.28); }
.gen-btn:hover::before { opacity:1; }
.gen-btn:active { transform:translateY(0); }
.gen-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

.tier-row { display: flex; gap: 8px; }

.tier-chip {
  flex: 1;
  height: 46px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.01em;
}

.tier-chip .dot { width: 7px; height: 7px; border-radius: 50%; transition: all 0.2s; }
.tier-chip[data-tier="beginner"] .dot { background: var(--green); }
.tier-chip[data-tier="mid"] .dot { background: var(--amber); }
.tier-chip[data-tier="advanced"] .dot { background: var(--accent3); }

.tier-chip:hover { border-color: var(--border2); color: var(--text); }
.tier-chip.active[data-tier="beginner"] { background:rgba(0,214,143,0.07); border-color:rgba(0,214,143,0.35); color:var(--green); box-shadow:0 0 18px rgba(0,214,143,0.07); }
.tier-chip.active[data-tier="mid"] { background:rgba(255,179,0,0.07); border-color:rgba(255,179,0,0.35); color:var(--amber); box-shadow:0 0 18px rgba(255,179,0,0.07); }
.tier-chip.active[data-tier="advanced"] { background:rgba(255,107,107,0.07); border-color:rgba(255,107,107,0.35); color:var(--accent3); box-shadow:0 0 18px rgba(255,107,107,0.07); }

/* LOADING */
#loadingState {
  display: none;
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 40px;
  text-align: center;
}
.loader-ring {
  width: 52px; height: 52px;
  margin: 0 auto 22px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loader-text {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--muted2);
  text-transform: uppercase;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:1} }

/* RESULTS */
#resultsSection {
  display: none;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px 100px;
}

.song-hero {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 32px 0 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
  gap: 20px;
  flex-wrap: wrap;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

.song-name {
  font-size: clamp(1.7rem, 4vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 5px;
}
.song-artist {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--muted2);
}
.meta-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.meta-tag {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 11px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  color: var(--muted2);
  background: var(--surface);
}
.tier-tag.beginner { color:var(--green); border-color:rgba(0,214,143,0.28); background:rgba(0,214,143,0.05); }
.tier-tag.mid { color:var(--amber); border-color:rgba(255,179,0,0.28); background:rgba(255,179,0,0.05); }
.tier-tag.advanced { color:var(--accent3); border-color:rgba(255,107,107,0.28); background:rgba(255,107,107,0.05); }

.sec-header { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
.sec-label { font-family:var(--font-mono); font-size:0.63rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.sec-line { flex:1; height:1px; background:var(--border); }

/* CHORD GRID */
.chords-wrap { margin-bottom:52px; animation:fadeUp 0.5s 0.08s ease both; }

.chord-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
  gap: 10px;
}

.chord-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 12px 14px;
  text-align: center;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  animation: fadeUp 0.4s ease both;
  position: relative;
  overflow: hidden;
  cursor: default;
}
.chord-card::after {
  content:'';
  position:absolute;
  top:0; left:50%; transform:translateX(-50%);
  width:55%; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0; transition:opacity 0.2s;
}
.chord-card:hover { border-color:rgba(0,229,255,0.22); background:var(--surface2); transform:translateY(-4px); box-shadow:0 18px 40px rgba(0,0,0,0.45),0 0 28px rgba(0,229,255,0.04); }
.chord-card:hover::after { opacity:1; }

.chord-label { font-size:1.45rem; font-weight:800; letter-spacing:-0.04em; color:var(--text); margin-bottom:12px; line-height:1; }
.fret-svg { width:100%; max-width:108px; display:block; margin:0 auto 10px; }
.chord-frets { font-family:var(--font-mono); font-size:0.58rem; letter-spacing:0.03em; color:var(--muted); margin-bottom:7px; }
.chord-hint { font-family:var(--font-body); font-style:italic; font-size:0.68rem; color:var(--muted2); line-height:1.4; }

/* LYRICS — light mode panel */
.lyrics-wrap { margin-bottom:52px; animation:fadeUp 0.5s 0.16s ease both; }

.lyrics-light-panel {
  background: #f8f9fb;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 32px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.05);
}

.lyrics-light-header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.lh-dot { width:10px; height:10px; border-radius:50%; }
.lh-dot-r { background:#ff5f57; }
.lh-dot-y { background:#febc2e; }
.lh-dot-g { background:#28c840; }

.lh-title {
  margin-left: 4px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #94a3b8;
}

.lyrics-columns {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 0;
}

.lyric-block {
  padding: 28px 28px 24px;
  border-right: 1px solid #e2e8f0;
  border-bottom: 1px solid #e2e8f0;
}

.lyric-block:nth-child(odd):last-child {
  border-right: none;
}

.sec-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(0,130,180,0.07);
  border: 1px solid rgba(0,130,180,0.15);
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #0077aa;
  margin-bottom: 18px;
}
.sec-dot { width:5px; height:5px; background:#0077aa; border-radius:50%; }

.lyrics-content { /* padding handled by .lyric-block */ }

.lyric-line { margin-bottom: 10px; line-height: 1; }
.lyric-line:last-child { margin-bottom: 0; }
.lyric-spacer { height: 14px; margin-bottom: 0; }

/* Each line = a flex row of chord+syllable cells */
.lyric-cells {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  row-gap: 10px;
}

/* One cell = chord label on top, lyric syllable below */
.lyric-cell {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 0;
}

.lc-chord {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-height: 24px;
  margin-bottom: 2px;
}

.lc-chord-empty {
  min-height: 24px;
}

/* Tiny inline fretboard diagram */
.lc-diagram {
  display: block;
  margin-bottom: 2px;
}

.lc-diagram .fret-svg {
  width: 52px;
  height: auto;
  display: block;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 5px;
  padding: 2px;
}

.inline-chord {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: #0369a1;
  letter-spacing: 0.02em;
  white-space: nowrap;
  padding: 2px 6px;
  margin-right: 2px;
  background: rgba(3,105,161,0.08);
  border: 1px solid rgba(3,105,161,0.22);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
  user-select: none;
}
.inline-chord:hover {
  background: rgba(3,105,161,0.16);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(3,105,161,0.15);
}

.lc-text {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 1.05rem;
  color: #1e293b;
  line-height: 1.5;
  white-space: pre;
}

/* Chord popup — stays dark */
.chord-popup {
  position: fixed;
  z-index: 9999;
  background: #1a2233;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 14px;
  padding: 14px 12px 10px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,229,255,0.08);
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px) scale(0.97);
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  text-align: center;
  min-width: 100px;
}
.chord-popup.visible { opacity:1; transform:translateY(0) scale(1); }
.popup-name { font-weight:800; font-size:0.88rem; letter-spacing:-0.02em; color:var(--accent); margin-bottom:8px; }

/* BOTTOM GRID */
.bottom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 52px;
  animation: fadeUp 0.5s 0.24s ease both;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 26px;
}
.info-card-title {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 16px;
}

.prog-chips { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
.prog-chip {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: var(--font-mono);
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--text);
  transition: all 0.15s;
  cursor: pointer;
}
.prog-chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.05); }
.prog-arrow { color:var(--muted); font-size:0.72rem; }

.strum-beats { display:flex; gap:5px; flex-wrap:wrap; }
.beat { width:36px; height:36px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:0.82rem; }
.beat-D { background:rgba(0,214,143,0.09); color:var(--green); border:1px solid rgba(0,214,143,0.2); }
.beat-U { background:rgba(0,229,255,0.09); color:var(--accent); border:1px solid rgba(0,229,255,0.2); }
.beat-rest { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

.strum-legend { margin-top:11px; display:flex; gap:14px; font-family:var(--font-mono); font-size:0.6rem; color:var(--muted); letter-spacing:0.06em; }

/* TIPS */
.tips-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 26px 28px;
  animation: fadeUp 0.5s 0.32s ease both;
}
.tips-title { font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted2); margin-bottom:14px; }
.tips-list { list-style:none; display:flex; flex-direction:column; gap:9px; }
.tips-list li { font-family:var(--font-body); font-size:0.93rem; color:var(--muted2); line-height:1.5; padding-left:18px; position:relative; }
.tips-list li::before { content:'→'; position:absolute; left:0; color:var(--accent); font-family:var(--font-mono); font-size:0.75rem; top:2px; }

/* ERROR */
#errorState {
  display: none;
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 40px;
  text-align: center;
}
.error-box { background:var(--surface); border:1px solid rgba(255,107,107,0.18); border-radius:18px; padding:36px; display:inline-block; }
.error-icon { font-size:2rem; margin-bottom:10px; }
.error-msg { font-family:var(--font-body); color:var(--muted2); font-size:0.95rem; font-style:italic; }

/* RESPONSIVE */
@media (max-width: 700px) {
  header, .hero, .search-panel, #resultsSection, #loadingState, #errorState { padding-left:20px; padding-right:20px; }
  .hero { padding-top:44px; padding-bottom:36px; }
  .input-row { grid-template-columns:1fr; }
  .gen-btn { height:52px; }
  .bottom-grid { grid-template-columns:1fr; }
  .chord-grid { grid-template-columns:repeat(3,1fr); }
  .lyrics-columns { grid-template-columns:1fr; }
  .lyric-block { border-right:none; }
  .lyric-text { font-size:0.9rem; }
}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="logo">
    <div class="logo-mark">🎸</div>
    <div class="logo-text">Strum<span>ly</span></div>
  </div>
  <div class="header-badge">G · C · E · A</div>
</header>

<section class="hero">
  <div class="eyebrow">AI Chord Generator</div>
  <h1 class="hero-title">Play any song<br><span class="em">on the uke.</span></h1>
  <p class="hero-sub">Type a song, pick your level — get chord diagrams, fingerings, and lyrics all in one view.</p>
</section>

<section class="search-panel">
  <div class="input-row">
    <input type="text" class="song-input" id="songInput" placeholder="Try 'Riptide', 'I'm Yours', 'Somewhere Over the Rainbow'…" autocomplete="off"/>
    <button class="gen-btn" id="generateBtn" onclick="generate()">Generate ↗</button>
  </div>
  <div class="tier-row">
    <button class="tier-chip active" data-tier="beginner" onclick="selectTier(this)"><div class="dot"></div>Beginner</button>
    <button class="tier-chip" data-tier="mid" onclick="selectTier(this)"><div class="dot"></div>Mid Level</button>
    <button class="tier-chip" data-tier="advanced" onclick="selectTier(this)"><div class="dot"></div>Advanced</button>
  </div>
</section>

<div id="loadingState">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loaderText">Finding chords…</div>
</div>

<div id="errorState">
  <div class="error-box">
    <div class="error-icon">🎵</div>
    <div class="error-msg" id="errorMsg">Could not load chords. Try a different song title.</div>
  </div>
</div>

<div id="resultsSection">
  <div class="song-hero" id="songHero"></div>
  <div id="chordsSection"></div>
  <div id="lyricsSection"></div>
  <div id="bottomSection"></div>
  <div id="tipsSection"></div>
</div>

</div>

<script>
let selectedTier = 'beginner';

function selectTier(btn) {
  document.querySelectorAll('.tier-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTier = btn.dataset.tier;
}

// ── SVG CHORD DIAGRAM ──────────────────────────────
// mode: 'dark' (default, chord grid & popup), 'light' (inline lyrics panel), 'tiny' (inline lyrics small)
function makeChordSVG(fingering, small, mode) {
  mode = mode || 'dark';
  const isTiny = mode === 'tiny';
  const isLight = mode === 'light' || isTiny;

  const W = isTiny ? 56 : small ? 88 : 108;
  const H = isTiny ? 62 : small ? 96 : 118;
  const pL = isTiny ? 10 : 18;
  const pR = isTiny ? 6 : 10;
  const pT = isTiny ? 10 : (small ? 16 : 20);
  const pB = isTiny ? 10 : 14;
  const frets = isTiny ? 4 : 5;
  const strings = 4;
  const strW = (W - pL - pR) / (strings - 1);
  const fretH = (H - pT - pB) / frets;
  const labels = ['G','C','E','A'];

  const nonOpen = fingering.filter(f => f > 0);
  const minFret = nonOpen.length ? Math.min(...nonOpen) : 0;
  const startFret = minFret > 2 ? minFret - 1 : 0;

  const nutCol    = isLight ? '#334155' : '#f0f4f8';
  const fretCol   = isLight ? 'rgba(51,65,85,0.18)' : 'rgba(255,255,255,0.09)';
  const strCol    = isLight ? 'rgba(51,65,85,0.28)' : 'rgba(255,255,255,0.16)';
  const labelCol  = isLight ? '#94a3b8' : '#4a5568';
  const openCol   = isLight ? '#0369a1' : '#00d68f';
  const dotFill   = isLight ? '#0369a1' : '#00e5ff';
  const dotText   = '#fff';
  const fretNumCol= isLight ? '#64748b' : '#4a5568';
  const dotR      = isTiny ? 5.5 : (small ? 7.5 : 8.5);
  const fontSize  = isTiny ? 7 : 9;

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="fret-svg">`;

  if (startFret === 0) {
    s += `<rect x="${pL}" y="${pT-3}" width="${W-pL-pR}" height="${isTiny?2:3}" rx="1" fill="${nutCol}" opacity="0.8"/>`;
  } else {
    s += `<text x="${pL-2}" y="${pT+fretH*0.6}" text-anchor="end" fill="${fretNumCol}" font-size="${isTiny?6:7.5}" font-family="JetBrains Mono,monospace">${startFret}</text>`;
  }

  for (let f = 0; f <= frets; f++) {
    const y = pT + f * fretH;
    if (f === 0 && startFret === 0) continue;
    s += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="${fretCol}" stroke-width="1"/>`;
  }
  for (let i = 0; i < strings; i++) {
    const x = pL + i * strW;
    s += `<line x1="${x}" y1="${pT}" x2="${x}" y2="${pT+frets*fretH}" stroke="${strCol}" stroke-width="${isTiny?0.9:1.2}"/>`;
  }
  if (!isTiny) {
    for (let i = 0; i < strings; i++) {
      const x = pL + i * strW;
      s += `<text x="${x}" y="${H-2}" text-anchor="middle" fill="${labelCol}" font-size="7" font-family="JetBrains Mono,monospace">${labels[i]}</text>`;
    }
  }

  fingering.forEach((fret, i) => {
    const x = pL + i * strW;
    if (fret === 0) {
      s += `<circle cx="${x}" cy="${pT-6}" r="${isTiny?3:3.5}" fill="none" stroke="${openCol}" stroke-width="1.5"/>`;
    } else {
      const df = fret - startFret;
      if (df >= 1 && df <= frets) {
        const y = pT + (df - 0.5) * fretH;
        s += `<circle cx="${x}" cy="${y}" r="${dotR}" fill="${dotFill}" opacity="0.92"/>`;
        s += `<text x="${x}" y="${y+fontSize*0.38}" text-anchor="middle" fill="${dotText}" font-size="${fontSize}" font-weight="700" font-family="JetBrains Mono,monospace">${fret}</text>`;
      }
    }
  });

  return s + `</svg>`;
}

// ── LYRICS RENDERER ──────────────────────────────
function parseLyricLine(line, chordMap, seenChords) {
  if (!line || !line.trim()) {
    return `<div class="lyric-line lyric-spacer"></div>`;
  }

  if (!line.includes('[')) {
    return `<div class="lyric-line">
      <div class="lyric-cells">
        <span class="lyric-cell"><span class="lc-chord lc-chord-empty"></span><span class="lc-text">${esc(line)}</span></span>
      </div>
    </div>`;
  }

  const re = /\[([^\]]+)\]([^\[]*)/g;
  let m;
  const tokens = [];

  const firstBracket = line.indexOf('[');
  if (firstBracket > 0) {
    tokens.push({ chord: '', text: line.slice(0, firstBracket) });
  }
  while ((m = re.exec(line)) !== null) {
    tokens.push({ chord: m[1], text: m[2] });
  }

  if (!tokens.length) {
    return `<div class="lyric-line"><div class="lyric-cells"><span class="lyric-cell"><span class="lc-chord lc-chord-empty"></span><span class="lc-text">${esc(line)}</span></span></div></div>`;
  }

  const cells = tokens.map(t => {
    if (!t.chord) {
      return `<span class="lyric-cell"><span class="lc-chord lc-chord-empty"></span><span class="lc-text">${esc(t.text || '\u00A0')}</span></span>`;
    }

    const fingering = chordMap[t.chord];
    const isNew = !seenChords.has(t.chord);
    if (isNew) seenChords.add(t.chord);

    // Always show the chord name badge; show diagram only on first occurrence
    let diagramHTML = '';
    if (isNew && fingering) {
      diagramHTML = `<span class="lc-diagram">${makeChordSVG(fingering, false, 'tiny')}</span>`;
    }

    const textContent = t.text || '\u00A0';
    return `<span class="lyric-cell">
      <span class="lc-chord">
        ${diagramHTML}
        <span class="inline-chord" data-chord="${esc(t.chord)}">${esc(t.chord)}</span>
      </span>
      <span class="lc-text">${esc(textContent)}</span>
    </span>`;
  }).join('');

  return `<div class="lyric-line"><div class="lyric-cells">${cells}</div></div>`;
}

function renderLyrics(sections, chordMap) {
  if (!sections || !sections.length) return '';

  const blocksHTML = sections.map(sec => {
    // Reset seen chords per section so diagrams re-appear in each section
    const seenChords = new Set();
    const linesHTML = (sec.lines || []).map(line => parseLyricLine(line, chordMap, seenChords)).join('');
    return `<div class="lyric-block">
      <div class="sec-tab"><span class="sec-dot"></span>${esc(sec.name)}</div>
      <div class="lyrics-content">${linesHTML}</div>
    </div>`;
  }).join('');

  return `<div class="lyrics-light-panel">
    <div class="lyrics-light-header">
      <div class="lh-dot lh-dot-r"></div>
      <div class="lh-dot lh-dot-y"></div>
      <div class="lh-dot lh-dot-g"></div>
      <div class="lh-title">Lyrics &amp; Chords — chord diagrams shown on first use per section</div>
    </div>
    <div class="lyrics-columns">${blocksHTML}</div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CHORD POPUP ──────────────────────────────
let popup = null;
document.addEventListener('mouseover', e => {
  const el = e.target.closest('.inline-chord');
  if (!el) return;
  const chord = el.dataset.chord;
  const m = window._chordMap || {};
  if (!m[chord]) return;
  if (!popup) {
    popup = document.createElement('div');
    popup.className = 'chord-popup';
    document.body.appendChild(popup);
  }
  popup.innerHTML = `<div class="popup-name">${esc(chord)}</div>${makeChordSVG(m[chord], true, 'dark')}`;
  const r = el.getBoundingClientRect();
  popup.style.left = (r.left + window.scrollX) + 'px';
  popup.style.top = (r.bottom + window.scrollY + 8) + 'px';
  popup.classList.add('visible');
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.inline-chord') && popup) popup.classList.remove('visible');
});

// ── RENDER ──────────────────────────────
function renderResults(d) {
  const { songTitle, artist, key, tempo, strumming, tier, chords, progression, sections, tips } = d;

  const cm = {};
  (chords || []).forEach(c => { cm[c.name] = c.fingering; });
  window._chordMap = cm;

  const tl = { beginner:'Beginner', mid:'Mid Level', advanced:'Advanced' }[tier] || tier;

  document.getElementById('songHero').innerHTML = `
    <div>
      <div class="song-name">${esc(songTitle)}</div>
      <div class="song-artist">by ${esc(artist)}</div>
    </div>
    <div class="meta-row">
      ${key ? `<div class="meta-tag">Key: ${esc(key)}</div>` : ''}
      ${tempo ? `<div class="meta-tag">♩ ${tempo} BPM</div>` : ''}
      <div class="meta-tag tier-tag ${tier}">${tl}</div>
    </div>`;

  document.getElementById('chordsSection').innerHTML = `
    <div class="chords-wrap">
      <div class="sec-header"><div class="sec-label">Chord Diagrams</div><div class="sec-line"></div></div>
      <div class="chord-grid">${(chords||[]).map((c,i) => `
        <div class="chord-card" style="animation-delay:${i*0.055}s">
          <div class="chord-label">${esc(c.name)}</div>
          ${makeChordSVG(c.fingering, false, 'dark')}
          <div class="chord-frets">${c.fingering.map((f,si)=>['G','C','E','A'][si]+':'+(f===0?'○':f)).join(' ')}</div>
          ${c.tip ? `<div class="chord-hint">${esc(c.tip)}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>`;

  if (sections && sections.length) {
    document.getElementById('lyricsSection').innerHTML = `
      <div class="lyrics-wrap">
        <div class="sec-header"><div class="sec-label">Lyrics &amp; Chords</div><div class="sec-line"></div></div>
        ${renderLyrics(sections, cm)}
      </div>`;
  }

  const progHTML = (progression||[]).map((c,i) =>
    `<div class="prog-chip">${esc(c)}</div>${i<progression.length-1?'<span class="prog-arrow">→</span>':''}`
  ).join('');

  const strumHTML = (strumming||'').split('').map(b =>
    b==='D' ? `<div class="beat beat-D">D</div>` :
    b==='U' ? `<div class="beat beat-U">U</div>` :
    `<div class="beat beat-rest">·</div>`
  ).join('');

  document.getElementById('bottomSection').innerHTML = `
    <div class="bottom-grid">
      <div class="info-card">
        <div class="info-card-title">Chord Progression</div>
        <div class="prog-chips">${progHTML}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Strumming Pattern</div>
        <div class="strum-beats">${strumHTML}</div>
        <div class="strum-legend"><span>D = Down</span><span>U = Up</span><span>· = Rest</span></div>
      </div>
    </div>`;

  if (tips && tips.length) {
    document.getElementById('tipsSection').innerHTML = `
      <div class="tips-wrap">
        <div class="tips-title">Playing Tips</div>
        <ul class="tips-list">${tips.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
      </div>`;
  }
}

// ── GENERATE ──────────────────────────────
const loadMsgs = ['Finding chords…','Tuning the strings…','Arranging fingerings…','Laying out lyrics…','Almost ready…'];
let msgI = 0, msgTimer;

async function generate() {
  const song = document.getElementById('songInput').value.trim();
  if (!song) { document.getElementById('songInput').focus(); return; }

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;

  msgI = 0;
  document.getElementById('loaderText').textContent = loadMsgs[0];
  msgTimer = setInterval(() => {
    msgI = (msgI + 1) % loadMsgs.length;
    document.getElementById('loaderText').textContent = loadMsgs[msgI];
  }, 1500);

  const tierMap = {
    beginner: 'ONLY open chords: C, Am, F, G, D, Em, A, Dm. Max 4 chords. No barre chords.',
    mid: 'Open chords + some barre chords like Bm, D7, G7, E7. Max 6 chords.',
    advanced: 'Accurate voicings with 7ths, maj7, barre chords. Up to 8 chords.'
  };

  const prompt = `Ukulele chord chart for "${song}" at ${selectedTier} level. ${tierMap[selectedTier]}

Respond ONLY with raw JSON (no markdown, no backticks, no explanation):
{
  "songTitle": "Title",
  "artist": "Artist",
  "key": "C major",
  "tempo": 120,
  "strumming": "D-DU-UDU",
  "tier": "${selectedTier}",
  "chords": [{"name":"C","fingering":[0,0,0,3],"tip":"short tip"}],
  "progression": ["C","G","Am","F"],
  "sections": [
    {"name":"Verse 1","lines":["[C]Walking down the [G]road","[Am]Feeling so [F]free",""]},
    {"name":"Chorus","lines":["[F]Oh [C]here we [G]go","[Am]Singing [F]loud"]}
  ],
  "tips": ["tip1","tip2","tip3"]
}

Fingering = [G_string, C_string, E_string, A_string], 0=open.
Known fingerings: C:[0,0,0,3] Am:[2,0,0,0] F:[2,0,1,0] G:[0,2,3,2] Em:[0,4,3,2] D:[2,2,2,0] A:[2,1,0,0] Dm:[2,2,1,0] G7:[0,2,1,2] E7:[1,2,0,2] Bm:[4,2,2,2] B7:[2,3,2,2] D7:[2,2,2,3] Cm:[0,3,3,3] Gm:[0,2,3,1] E:[4,4,4,2] C7:[0,0,0,1] A7:[0,1,0,0] Bb:[3,2,1,1] Fm:[1,0,1,3]

Sections: include the COMPLETE FULL lyrics of the entire song — every verse, chorus, pre-chorus, bridge, and outro. Do NOT truncate or abbreviate. Place [Chord] markers right before the syllable where the chord changes. Include all repeated sections separately (e.g. Chorus appears multiple times → include each occurrence). Aim for 6-10 sections covering the whole song.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    clearInterval(msgTimer);

    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();

    let parsed;
    try { parsed = JSON.parse(clean); }
    catch {
      const m = clean.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]); else throw new Error('parse error');
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'block';
    renderResults(parsed);
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearInterval(msgTimer);
    console.error(err);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Something went wrong. Try a different song name.';
  }

  document.getElementById('generateBtn').disabled = false;
}

document.getElementById('songInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
